<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Water Warrior</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <!-- Add Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <h1 class="splash-title">Water Warrior</h1>
    <h2 class="splash-subtitle">
      A <span class="cw-highlight">Charity:Water</span> Adventure
    </h2>
    <div class="splash-content" id="splash-content">
      
      <button id="enter-button" title="Enter the game">ENTER GAME</button>
    </div>
  </div>

  <!-- Fun Fact Modal -->
  <div id="fun-fact-modal" class="hidden">
    <div class="fun-fact-modal-content">
      <h3>Did you know?</h3>
      <p>785 million people in the world don't have clean water. That's 1 in 10 people on the planet.</p>
      <div id="fun-fact-timer" style="margin-top:1em;color:#1AABFF;font-weight:bold;"></div>
    </div>
  </div>
   <!-- Game Screen -->
  <div id="game-screen" class="hidden py-10">
    <div class="text-center">
      <h1 class="text-4xl font-bold">The Water Warrior Adventure</h1>
      <h2 id="user-points" class="text-lg mt-2">Points: 0</h2>
    </div>

    <!-- Campus Map - Desert Layout -->
    <div class="desert-campus-container">
      <!-- Walkways -->
      <div class="walkway walkway-north"></div>
      <div class="walkway walkway-east"></div>
      <div class="walkway walkway-south"></div>
      <div class="walkway walkway-west"></div>
      
      <!-- Center Campus Area -->
      <div class="campus-center-area">
        <!-- Center Building - Dormitory -->
        <div class="campus-block center-building bg-green-100 hover:bg-green-200 rounded-full shadow-lg text-center cursor-pointer" id="dorm-building">
          <img src="https://img.icons8.com/ios-filled/50/000000/dormitory.png" class="mx-auto mb-2" alt="Dormitory">
          <p class="font-semibold">Dormitory</p>
        </div>
      </div>

      <!-- Surrounding Buildings in Rocky Areas -->
      <div class="campus-block surrounding-building bg-blue-100 hover:bg-blue-200 rounded-full shadow-lg text-center cursor-pointer" style="--rotation: 0deg;">
        <img src="https://img.icons8.com/ios-filled/50/000000/university.png" class="mx-auto mb-2" alt="Library">
        <p class="font-semibold">Library</p>
      </div>

      <div class="campus-block surrounding-building bg-yellow-100 hover:bg-yellow-200 rounded-full shadow-lg text-center cursor-pointer" style="--rotation: 90deg;">
        <img src="https://img.icons8.com/ios-filled/50/000000/classroom.png" class="mx-auto mb-2" alt="Lecture Hall">
        <p class="font-semibold">Lecture Hall</p>
      </div>

      <div class="campus-block surrounding-building bg-red-100 hover:bg-red-200 rounded-full shadow-lg text-center cursor-pointer" style="--rotation: 180deg;">
        <img src="https://img.icons8.com/ios-filled/50/000000/cafeteria.png" class="mx-auto mb-2" alt="Cafeteria">
        <p class="font-semibold">Cafeteria</p>
      </div>

      <div class="campus-block surrounding-building bg-purple-100 hover:bg-purple-200 rounded-full shadow-lg text-center cursor-pointer" style="--rotation: 270deg;">
        <img src="https://img.icons8.com/ios-filled/50/000000/gym.png" class="mx-auto mb-2" alt="Gym">
        <p class="font-semibold">Gym</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Modal trigger
    document.getElementById('dorm-building').addEventListener('click', function() {
      alert("You clicked the Dormitory!");
    });
  </script>
</body>
</html>
