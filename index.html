<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Water Warrior</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <!-- Add Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <h1 class="splash-title">Water Warrior</h1>
    <h2 class="splash-subtitle">
      A <span class="cw-highlight">Charity:Water</span> Adventure
    </h2>
    <div class="splash-content" id="splash-content">
      
      <button id="enter-button" title="Enter the game">ENTER GAME</button>
    </div>
  </div>

  <!-- Fun Fact Modal -->
  <div id="fun-fact-modal" class="hidden">
    <div class="fun-fact-modal-content">
      <h3>Did you know?</h3>
      <p>785 million people in the world don't have clean water. That's 1 in 10 people on the planet.</p>
      <div id="fun-fact-timer" style="margin-top:1em;color:#1AABFF;font-weight:bold;"></div>
    </div>
  </div>
   <!-- Game Screen -->
  <div id="game-screen" class="hidden py-10">
    <div class="text-center">
      <h1 class="text-4xl font-bold">The Water Warrior Adventure</h1>
      <h2 id="user-points" class="text-lg mt-2">Points: 0</h2>
    </div>

    <!-- Campus Map - Desert Layout -->
    <div class="desert-campus-container">
      <!-- These are the new divs for the triangle backgrounds -->
      <div class="background-triangle" id="triangle-top"></div>
      <div class="background-triangle" id="triangle-right"></div>
      <div class="background-triangle" id="triangle-bottom"></div>
      <div class="background-triangle" id="triangle-left"></div>

      <!-- Walkways -->
      <div class="walkway walkway-north"></div>
      <div class="walkway walkway-east"></div>
      <div class="walkway walkway-south"></div>
      <div class="walkway walkway-west"></div>
      
      <!-- Center Campus Area -->
      <div class="campus-center-area">
        <!-- Center Building - Dormitory -->
        <div class="campus-block center-building bg-green-100 hover:bg-green-200 rounded-full shadow-lg text-center cursor-pointer" id="dorm-building">
          <i class="bi bi-house-door"></i> <!-- Example: House icon for Dormitory -->
          <p class="font-semibold">Dorm Room</p>
        </div>
      </div>

      <!-- Surrounding Buildings in Rocky Areas -->
      <div class="campus-block surrounding-building building-north">
        <i class="bi bi-book-half"></i>
        <p>Library</p>
      </div>

      <div class="campus-block surrounding-building building-east">
        <i class="bi bi-easel2"></i>
        <p>Lecture Hall</p>
      </div>

      <div class="campus-block surrounding-building building-south">
        <i class="bi bi-cup-straw"></i>
        <p>Cafeteria</p>
      </div>

      <div class="campus-block surrounding-building building-west">
        <i class="bi bi-bicycle"></i>
        <p>Gym</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Modal trigger
    document.getElementById('dorm-building').addEventListener('click', function() {
      alert("You clicked the Dormitory!");
    });
  </script>
</body>
</html>
